{% extends "base.html" %} {% block head %}
<title>401 - Unauthorized</title>
<style>
    .error-shell {
        padding: 1rem 0;
    }

    .error-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        margin-top: 1rem;
    }
</style>
{% endblock %} {% block body %}
<section class="error-shell">
    <div class="error-code">401</div>
    <h1 class="page-title error-title">Unauthorized</h1>
    <p class="muted">You need to sign in before accessing this page.</p>
    <div class="error-actions">
        <a class="btn-app" href="{{ url_for('login') }}">Back to login</a>
    </div>
</section>
{% endblock %}
