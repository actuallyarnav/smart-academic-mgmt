{% extends "base.html" %} {% block head %}
<title>Login</title>
<style>
    .login-shell {
        position: relative;
        max-width: 760px;
        margin: 0 auto;
    }

    .login-form label {
        display: block;
        font-size: 0.88rem;
        color: var(--muted-color);
        margin-bottom: 0.35rem;
    }

    .secret-admin-login {
        position: absolute;
        top: 0.35rem;
        right: 0.35rem;
        z-index: 10;
    }

    .secret-admin-btn {
        display: inline-block;
        width: 2rem;
        height: 2rem;
        border-radius: var(--radius);
        border: 1px solid var(--border-color);
        background-color: var(--surface-color);
        opacity: 0.35;
    }

    .secret-admin-btn:hover {
        opacity: 0.9;
        border-color: var(--accent-color);
    }

    .role-selector button {
        min-width: 125px;
    }
</style>
{% endblock %} {% block body %}
<section class="login-shell">
    <div class="secret-admin-login">
        <a
            href="{{ url_for('admin.admin_home') }}"
            title="super secret admin access button (DEV)"
            class="secret-admin-btn"
        ></a>
    </div>

    <h1 class="page-title">Smart Academic Management System</h1>
    <p class="page-subtitle">
        Sign in to continue with your institutional account.
    </p>

    <div class="section-block">
        <h2 class="section-heading">Choose Role</h2>
        <form method="get" class="button-group role-selector mb-3">
            <button
                class="{{ 'btn-app' if role == 'student' else 'btn-outline-app' }}"
                name="role"
                value="student"
                type="submit"
            >
                Student
            </button>
            <button
                class="{{ 'btn-app' if role == 'teacher' else 'btn-outline-app' }}"
                name="role"
                value="teacher"
                type="submit"
            >
                Teacher
            </button>
            <button
                class="{{ 'btn-app' if role == 'admin' else 'btn-outline-app' }}"
                name="role"
                value="admin"
                type="submit"
            >
                Admin
            </button>
        </form>

        {% if role %}
        <form method="post" action="/" class="login-form row g-3">
            <input type="hidden" name="role" value="{{ role }}" />

            <div class="col-12 col-md-6">
                <label for="email">Email ID</label>
                <input
                    id="email"
                    class="form-control"
                    type="text"
                    name="email"
                    required
                />
            </div>

            <div class="col-12 col-md-6">
                <label for="password">Password</label>
                <input
                    id="password"
                    class="form-control"
                    type="password"
                    name="password"
                    required
                />
            </div>

            <div class="col-12">
                <button type="submit" class="btn-app">
                    Login as {{ role|capitalize }}
                </button>
            </div>
        </form>
        {% else %}
        <p class="muted mb-0">Select a role to load the sign-in form.</p>
        {% endif %}
    </div>
</section>
{% endblock %}
